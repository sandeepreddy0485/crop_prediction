services:
  - type: web
    name: cropsense-backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python ../ml/train_model.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET
        value: cropsense_super_secret_key_2024_xyz789abc
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app
